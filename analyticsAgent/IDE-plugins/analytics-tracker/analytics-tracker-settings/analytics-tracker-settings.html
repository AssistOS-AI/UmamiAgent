<div class="analytics-settings-modal">
    <div class="modal-header">
        <div class="modal-title">Analytics Tracker Settings</div>
        <div class="close" data-local-action="closeModal" aria-label="Close">
            <img class="close-icon" src="./assets/icons/x-mark.svg" alt="close">
        </div>
    </div>

    <div class="modal-body analytics-settings-body">
        <div class="analytics-settings-grid">
            <label class="form-item">
                <span class="form-label">Umami Public URL</span>
                <input id="analyticsUmamiUrl" class="form-input" type="url" placeholder="http://127.0.0.1:3000" spellcheck="false">
            </label>

            <label class="form-item">
                <span class="form-label">Website</span>
                <select id="analyticsWebsiteSelect" class="form-input">
                    <option value="">Load websites from Umami</option>
                </select>
            </label>

            <label class="form-item">
                <span class="form-label">Allowed Domains</span>
                <input id="analyticsDomains" class="form-input" type="text" placeholder="localhost,127.0.0.1,example.com" spellcheck="false">
            </label>

            <label class="form-item">
                <span class="form-label">Script Mode</span>
                <select id="analyticsScriptMode" class="form-input">
                    <option value="standard">Standard</option>
                    <option value="manual">Manual events only</option>
                </select>
            </label>
        </div>

        <div class="analytics-settings-actions">
            <button type="button" class="general-button" data-local-action="openDashboard">Open Dashboard</button>
            <button type="button" id="analyticsLoadWebsitesButton" class="general-button" data-local-action="loadWebsites">Refresh Websites</button>
            <button type="button" id="analyticsCopyButton" class="general-button" data-local-action="copyScriptCode">Copy script code</button>
        </div>

        <label class="form-item analytics-snippet-wrap">
            <span class="form-label">Generated script snippet</span>
            <textarea id="analyticsScriptSnippet" class="form-input" rows="7" spellcheck="false"></textarea>
        </label>

        <div id="analyticsSettingsStatus" class="analytics-settings-status" role="status" aria-live="polite"></div>
    </div>
</div>
